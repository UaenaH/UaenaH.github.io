# .github/workflows/deploy.yml

name: Deploy VitePress to GitHub Pages

on:
  # 触发条件：推送到 main 分支 (如果是 master 分支请改为 master)
  push:
    branches: [main]
  
  # 允许手动在 GitHub 界面触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，允许写入 gh-pages 分支
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署任务
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史记录，如果需要获取最后更新时间等

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 根据你的项目需求调整版本
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # 或者 npm install

      - name: Build
        run: npm run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传构建输出的目录，VitePress 默认是 .vitepress/dist
          path: .vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4